name: gci_mobile
description: "Jam by CrowdSmart — a Flutter mobile frontend for the gcibmn collective-intelligence API."
publish_to: 'none'

version: 0.1.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Navigation + deep links (go_router consumes platform deep links natively)
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  fl_chart: ^0.69.2
  cupertino_icons: ^1.0.8

  # Utilities
  share_plus: ^10.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1C1E22"
  image: assets/icon.png
  android_12:
    color: "#1C1E22"
    image: assets/icon.png
